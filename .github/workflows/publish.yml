name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # Запуск только при создании тега (например, v2.0.1)

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi  # Среда для Trusted Publishing
      url: https://pypi.org/p/ki-manager
    permissions:
      id-token: write  # Обязательное разрешение для авторизации OIDC
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling
          
      - name: Build package
        run: python -m build
        
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
